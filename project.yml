name: Spender
options:
  bundleIdPrefix: com.spender
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  OpenAI:
    url: https://github.com/MacPaw/OpenAI
    from: "0.3.0"
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    from: "0.14.0"
targets:
  Spender:
    type: application
    platform: macOS
    sources:
      - Spender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spender.app
        INFOPLIST_FILE: Spender/Resources/Info.plist
        PRODUCT_NAME: Spender
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: OpenAI
      - package: CoreXLSX
    entitlements:
      path: Spender/Resources/Spender.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
  SpenderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SpenderTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spender.tests
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: Spender
