name: Spender
options:
  bundleIdPrefix: com.spender
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Spender:
    type: application
    platform: iOS
    sources:
      - path: Spender
    settings:
      base:
        INFOPLIST_FILE: Spender/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.spender.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: LinkKit
    entitlements:
      path: Spender/Spender.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  SpenderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpenderTests
    dependencies:
      - target: Spender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spender.tests

packages:
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios
    from: "5.6.0"
