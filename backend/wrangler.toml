name = "spender-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"

[vars]
PLAID_ENV = "sandbox"

# Create KV namespace with: wrangler kv namespace create ACCESS_TOKENS
# Then replace the id below
[[kv_namespaces]]
binding = "ACCESS_TOKENS"
id = "YOUR_KV_NAMESPACE_ID"

# Set secrets with:
# wrangler secret put PLAID_CLIENT_ID
# wrangler secret put PLAID_SECRET
# wrangler secret put OPENAI_API_KEY
# wrangler secret put DEVICE_AUTH_SECRET
